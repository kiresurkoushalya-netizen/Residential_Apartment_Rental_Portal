services:
 db:
  image: postgres:15
  env_file:
    - .env
  environment:
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  volumes:
    - pgdata:/var/lib/postgresql/data

 backend:
  build: ./backend
  env_file:
    - .env
  depends_on:
    - db
  ports:
    - "5000:5000"    

volumes:
  pgdata:
