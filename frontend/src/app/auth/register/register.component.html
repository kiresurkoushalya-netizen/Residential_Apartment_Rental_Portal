<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800">Register</h2>
    <p class="text-center text-gray-500 mt-2">
      Create your tenant account
    </p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <!-- Name -->
      <div>
        <label class="text-sm text-gray-600 font-medium">Full Name</label>
        <input
          type="text"
          formControlName="name"
          class="w-full mt-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500"
          placeholder="Enter full name"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="text-sm text-gray-600 font-medium">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full mt-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500"
          placeholder="Enter email"
        />
      </div>

      <!-- Phone -->
      <div>
        <label class="text-sm text-gray-600 font-medium">Phone</label>
        <input
          type="text"
          formControlName="phone"
          class="w-full mt-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500"
          placeholder="Enter phone"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm text-gray-600 font-medium">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full mt-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-green-500"
          placeholder="Enter password"
        />
      </div>

      <!-- Success -->
      <p *ngIf="successMsg" class="text-green-600 text-sm font-medium">
        {{ successMsg }}
      </p>

      <!-- Error -->
      <p *ngIf="errorMsg" class="text-red-600 text-sm font-medium">
        {{ errorMsg }}
      </p>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-semibold transition disabled:opacity-60"
      >
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <!-- Login Link -->
    <p class="text-center text-sm text-gray-600 mt-5">
      Already have an account?
      <a routerLink="/login" class="text-blue-600 font-semibold hover:underline">
        Login
      </a>
    </p>
  </div>
</div>
