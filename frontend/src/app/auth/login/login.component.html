<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800">Login</h2>
    <p class="text-center text-gray-500 mt-2">
      Welcome back to Residential Portal
    </p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <!-- Email -->
      <div>
        <label class="text-sm text-gray-600 font-medium">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full mt-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter email"
        />
        <p *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
          class="text-red-500 text-sm mt-1">
          Enter valid email
        </p>
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm text-gray-600 font-medium">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full mt-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter password"
        />
      </div>

      <!-- Error -->
      <p *ngIf="errorMsg" class="text-red-600 text-sm font-medium">
        {{ errorMsg }}
      </p>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold transition disabled:opacity-60"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <!-- Register Link -->
    <p class="text-center text-sm text-gray-600 mt-5">
      Don’t have an account?
      <a routerLink="/register" class="text-blue-600 font-semibold hover:underline">
        Register
      </a>
    </p>
  </div>
</div>
