<h2 class="text-2xl font-semibold mb-4">Add New Unit</h2>

<form [formGroup]="unitForm" (ngSubmit)="submit()" class="space-y-4 bg-white p-6 rounded shadow">

  <div>
    <label class="block">Tower</label>
    <input formControlName="tower" class="input" />
    <p class="error" *ngIf="submitted && unitForm.get('tower')?.errors">
      Tower is required
    </p>
  </div>

  <div>
    <label class="block">Unit Number</label>
    <input formControlName="unitNumber" class="input" />
    <p class="error" *ngIf="submitted && unitForm.get('unitNumber')?.errors">
      Unit number is required
    </p>
  </div>

  <div>
    <label class="block">Floor</label>
    <input type="number" formControlName="floor" class="input" />
  </div>

  <div>
    <label class="block">Rent</label>
    <input type="number" formControlName="rent" class="input" />
    <p class="error" *ngIf="submitted && unitForm.get('rent')?.errors">
      Rent must be at least 1000
    </p>
  </div>

  <div>
    <label class="block">Status</label>
    <select formControlName="status" class="input">
      <option value="available">Available</option>
      <option value="occupied">Occupied</option>
    </select>
  </div>

  <button class="bg-blue-600 text-white px-4 py-2 rounded">
    Add Unit
  </button>

  <p class="text-green-600" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="text-red-600" *ngIf="errorMessage">{{ errorMessage }}</p>

</form>
