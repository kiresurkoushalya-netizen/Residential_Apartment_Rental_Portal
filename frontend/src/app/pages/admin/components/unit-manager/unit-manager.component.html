<div class="bg-white shadow rounded-2xl p-5">
  <h2 class="text-lg font-semibold text-gray-700 mb-4">Manage Units</h2>

  <select [(ngModel)]="unitForm.tower_id" class="w-full mb-3 border rounded-lg px-3 py-2">
    <option value="">Select Tower</option>
    <option *ngFor="let t of towers" [value]="t.id">{{ t.name }}</option>
  </select>

  <input [(ngModel)]="unitForm.unit_no" placeholder="Unit No" class="w-full mb-3 border rounded-lg px-3 py-2" />

  <input [(ngModel)]="unitForm.floor" placeholder="Floor" type="number" class="w-full mb-3 border rounded-lg px-3 py-2" />

  <select [(ngModel)]="unitForm.bhk" class="w-full mb-3 border rounded-lg px-3 py-2">
    <option value="1BHK">1BHK</option>
    <option value="2BHK">2BHK</option>
    <option value="3BHK">3BHK</option>
  </select>

  <input [(ngModel)]="unitForm.rent" placeholder="Rent" type="number" class="w-full mb-3 border rounded-lg px-3 py-2" />

  <select [(ngModel)]="unitForm.status" class="w-full mb-3 border rounded-lg px-3 py-2">
    <option value="available">Available</option>
    <option value="occupied">Occupied</option>
  </select>

  <button
    (click)="onAddUnit()"
    class="w-full bg-green-600 hover:bg-green-700 text-white rounded-lg py-2"
  >
    Add Unit
  </button>

  <h3 class="mt-5 font-semibold text-gray-700">Units List</h3>

  <div class="overflow-x-auto mt-2">
    <table class="w-full text-sm border">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-2 text-left">ID</th>
          <th class="p-2 text-left">Unit</th>
          <th class="p-2 text-left">Tower</th>
          <th class="p-2 text-left">BHK</th>
          <th class="p-2 text-left">Rent</th>
          <th class="p-2 text-left">Status</th>
          <th class="p-2 text-left">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let u of units" class="border-t">
          <td class="p-2">{{ u.id }}</td>
          <td class="p-2">{{ u.unit_no }}</td>
          <td class="p-2">{{ u.tower }}</td>
          <td class="p-2">{{ u.bhk }}</td>
          <td class="p-2">{{ u.rent }}</td>
          <td class="p-2">{{ u.status }}</td>
          <td class="p-2">
            <button
              (click)="onDelete(u.id)"
              class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs"
            >
              Delete
            </button>
          </td>
        </tr>
      </tbody>

    </table>
  </div>
</div>
