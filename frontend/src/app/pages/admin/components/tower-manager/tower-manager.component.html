<div class="bg-white shadow rounded-2xl p-5">
  <h2 class="text-lg font-semibold text-gray-700 mb-4">Add Tower</h2>

  <input
    [(ngModel)]="towerForm.name"
    placeholder="Tower Name"
    class="w-full mb-3 border rounded-lg px-3 py-2"
  />

  <input
    [(ngModel)]="towerForm.floors"
    placeholder="Floors"
    type="number"
    class="w-full mb-3 border rounded-lg px-3 py-2"
  />

  <button
    (click)="onAddTower()"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2"
  >
    Add Tower
  </button>

  <h3 class="mt-5 font-semibold text-gray-700">Towers List</h3>
  <ul class="mt-2 text-sm text-gray-600">
    <li *ngFor="let t of towers">
      {{ t.name }} (Floors: {{ t.floors }})
    </li>
  </ul>
</div>
